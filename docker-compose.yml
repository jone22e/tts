services:
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: kokoro-tts
    restart: unless-stopped
    ports:
      - "8880:8880"
    environment:
      USE_GPU: "true"
      PYTHONUNBUFFERED: "1"
      API_LOG_LEVEL: "INFO"
      PYTHONPATH: "/app:/app/api"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
