version: "3.9"

services:
  xtts:
    image: ghcr.io/coqui-ai/tts-cpu
    container_name: xtts
    ports:
      - "8881:5002"
    environment:
      - COQUI_TOS_AGREED=1
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    command: >
      python3 TTS/server/server.py
      --model_name tts_models/multilingual/multi-dataset/xtts_v2
      --use_cuda true